# Minimal Redis config for the noname personal hub.
# Used for SSE pub-sub (yt-dlp progress) and as a generic cache.

# Bind inside the docker network only (compose maps the port for host access).
bind 0.0.0.0
protected-mode no

# Persistence: AOF on, fsync once per second (default).
appendonly yes
appendfsync everysec

# Cap memory; LRU evict so the cache stays useful when full.
maxmemory 256mb
maxmemory-policy allkeys-lru
